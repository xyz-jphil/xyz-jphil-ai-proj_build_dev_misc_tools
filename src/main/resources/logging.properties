# Logging configuration for Project Build & Dev Tools
# This will be overridden by verbose mode flag

# Root logger level
.level=SEVERE

# ArcadeDB loggers - suppress unless verbose
com.arcadedb.level=OFF
ArcadeDBServer.level=OFF
HttpServer.level=OFF
PaginatedComponentFile.level=OFF

# JavaFX loggers
javafx.level=OFF

# Console handler
handlers=java.util.logging.ConsoleHandler
java.util.logging.ConsoleHandler.level=SEVERE
java.util.logging.ConsoleHandler.formatter=java.util.logging.SimpleFormatter

# Format pattern (simpler format)
java.util.logging.SimpleFormatter.format=%1$tY-%1$tm-%1$td %1$tH:%1$tM:%1$tS %4$s [%2$s] %5$s%6$s%n
